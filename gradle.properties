#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx6g
kotlin.native.cacheKind=none
kotlin.incremental=true
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dkotlin.daemon.jvm.options=-Xmx4g
kotlin.native.jvmArgs=-Xmx4g

#Gradle
org.gradle.configuration-cache=true
org.gradle.caching=true
org.gradle.parallel=false
org.gradle.configureondemand=true
org.gradle.workers.max=2

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true
org.jetbrains.compose.experimental.resources=true

compose.ios.resources.sync=true
